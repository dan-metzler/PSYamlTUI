name: Build and Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # required so git describe can see tags

      - name: Install build dependencies
        shell: pwsh
        run: |
          Install-Module -Name InvokeBuild   -Force -Scope CurrentUser
          Install-Module -Name ModuleBuilder -Force -Scope CurrentUser
          Install-Module -Name platyPS       -Force -Scope CurrentUser
          Install-Module -Name Pester        -Force -Scope CurrentUser

      - name: Install module requirements
        shell: pwsh
        run: .\Install-Requirements.ps1

      - name: Run full build (capture log)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Invoke-Build -File .\.build.ps1 -Type Full -Version $version 2>&1 | Tee-Object -FilePath .\build-output.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .\build-output.txt

      - name: Zip output
        shell: pwsh
        run: Compress-Archive -Path .\Output\PSYamlTUI -DestinationPath .\PSYamlTUI-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: PSYamlTUI-${{ github.ref_name }}.zip

      - name: Publish to PowerShell Gallery
        if: ${{ success() && env.PSGALLERY_API_KEY != '' }}
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          $apiKey = [string]$env:PSGALLERY_API_KEY
          if ([string]::IsNullOrWhiteSpace($apiKey)) {
            throw 'PSGALLERY_API_KEY is empty. Check repository secret configuration.'
          }
          $apiKey = $apiKey.Trim()

          $moduleManifestPath = '.\Output\PSYamlTUI\PSYamlTUI.psd1'
          if (-not (Test-Path -LiteralPath $moduleManifestPath)) {
            throw "Built module manifest was not found at $moduleManifestPath"
          }

          $manifest = Test-ModuleManifest -Path $moduleManifestPath
          Write-Host "Preparing to publish module '$($manifest.Name)' version '$($manifest.Version)' to PSGallery."

          $existing = Find-Module -Name $manifest.Name -Repository PSGallery -ErrorAction SilentlyContinue
          if ($null -ne $existing) {
            Write-Host "PSGallery currently has version '$($existing.Version)' for '$($existing.Name)'."
          }
          else {
            Write-Host "No existing PSGallery package named '$($manifest.Name)' found."
          }

          Publish-Module -Path .\Output\PSYamlTUI -NuGetApiKey $apiKey -Verbose -ErrorAction Stop